services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: osint
      POSTGRES_PASSWORD: osint_dev_password
      POSTGRES_DB: osint_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osint -d osint_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
